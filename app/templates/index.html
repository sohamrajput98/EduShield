<!DOCTYPE html>
<html>
<head>
    <title>EduShield AI | AMD Hackathon</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div class="card">
    <h1>🛡️ EduShield <span class="accent">AI</span></h1>
    <p style="font-size: 0.85rem; opacity: 0.6; margin-top: -10px;">Hardware-Accelerated Threat Detection</p>

    <textarea id="emailText" placeholder="Paste email content for silicon-level analysis..."></textarea>

    <div style="margin-top:15px; font-size: 0.8rem;">
        <input type="file" id="emailFile" accept=".eml" style="display:none">
        <button onclick="document.getElementById('emailFile').click()" style="background: #21262d; width: auto; padding: 6px 12px; margin: 0;">📁 Attach .eml</button>
    </div>

    <button onclick="analyzeEmail()">EXECUTE SCAN</button>

    <div id="loading" class="hidden">Scanning Neural Patterns...</div>

    <div id="result" class="hidden">
        <div class="risk-meter-wrap">
            <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path id="circleProgress" class="circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <text x="18" y="21" class="percentage" id="riskScore" style="fill:white; font-size: 8px; text-anchor: middle;">0%</text>
            </svg>
            <div>
                <div id="labelBadge">RESULT</div>
                <div id="attackType" style="font-size: 0.9rem; margin-top: 5px; font-weight: bold;"></div>
            </div>
        </div>

        <h3 style="font-size: 0.9rem; margin-top: 20px; color: var(--amd-teal);">THREAT INDICATORS:</h3>
        <ul id="reasons" class="reasons-list"></ul>
    </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
