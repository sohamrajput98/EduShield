<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduShield AI | AMD Performance Hub</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <div class="header-main">
                <h1>EDUSHIELD <span class="accent">AI</span></h1>
                <div class="amd-badge">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/AMD_Logo.svg" class="amd-logo" alt="AMD">
                    <span>RYZEN™ OPTIMIZED</span>
                </div>
            </div>
            <p class="subtitle">NEURAL THREAT MITIGATION // HARDWARE-ACCELERATED</p>
        </header>

        <textarea id="emailText" placeholder="[WAITING FOR DATA INPUT STREAM...]"></textarea>

        <div id="fileDisplay" class="file-terminal hidden">
            <div class="file-info">
                <span class="pulse">●</span> BLOB: <span id="fileName"></span> | <span id="fileSize"></span>
            </div>
            <div class="remove-btn" onclick="clearFile()">[ REMOVE_FILE ]</div>
        </div>

        <div class="btn-group">
            <input type="file" id="emailFile" accept=".eml" style="display:none" onchange="handleFileLoad(this)">
            <button class="secondary-btn" onclick="document.getElementById('emailFile').click()">📁 LOAD .EML</button>
            <button class="primary-btn" onclick="analyzeEmail()">EXECUTE DEEP SCAN</button>
        </div>

        <div id="resultArea" class="hidden">
            <h3 class="section-title">DETECTION_LOGS</h3>
            <ul id="reasons" class="reasons-list"></ul>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-box risk-meter-wrap">
            <span class="label-title">Risk Analysis Score</span>
            <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path id="circleProgress" class="circle" stroke="#333" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <text x="18" y="21" id="riskScore" class="percentage">0%</text>
            </svg>
            <div id="labelBadge">SYSTEM_IDLE</div>
        </div>

        <div class="panel-box">
            <span class="label-title">Core Telemetry</span>
            <div id="telemetry" class="telemetry-feed">
                > CORE_IDLE<br>
                > RADEON_GPU_LISTENING
            </div>
            <div class="histogram" id="cpuHistogram">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="panel-box">
            <span class="label-title">Classification</span>
            <div id="attackType" class="class-text">---</div>
            <div id="emailCategory" class="cat-text"></div>
        </div>
    </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
